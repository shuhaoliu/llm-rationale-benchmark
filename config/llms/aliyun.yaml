# Default LLM configuration for rationale benchmark
# This file provides base configuration and defaults for all LLM providers

defaults:
  timeout: 60
  max_retries: 3
  temperature: 0.8
  max_tokens: 1024
  response_format: text

providers:
  aliyun_openai_compatible:
    api_key: "${DASHSCOPE_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    models:
      - "deepseek-v4-pro"
      - "deepseek-v3.2"
      - "deepseek-v3.1"
      - "deepseek-v3"
      - "glm-5.1"
      - "glm-5"
      - "glm-4.7"
      - "glm-4.6"
      - "glm-4.5"
      - "qwen3.6-max-preview"
      - "qwen3.6-plus"
      - "qwen3.6-flash"
      - "qwen3.6-35b-a3b"
      - "qwen3.6-37b"
      - "qwen3.5-plus"
      - "qwen3.5-flash"
      - "qwen3.5-35b-a3b"
      - "qwen3.5-37b"
      - "qwen3.5-122b-a10b"
      - "qwen3.5-397b-a17b"
      - "qwen3-0.6b"
      - "qwen3-1.7b"
      - "qwen3-8b"
      - "qwen3-14b"
      - "qwen3-32b"
      - "qwen3-30b-a3b"
      - "qwen3-235b-a22b"

questionnaire:
  id: "risky-choice-framing"
  name: "Risky Choice Framing"
  description: "Risky-choice framing items from the RiskyChoiceFraming sheet of Turing-Test-Materials.xlsx."
  version: 1
  system_prompt: |
    You are participating in an interview.
    Answer each question as yourself by choosing either Plan A or Plan B.
    Follow the requested answer format and do not provide explanations.
  metadata:
    default_population: 50
    author: "Benchmark Curation Team"
    source: "config/questionnaires/Turing-Test-Materials.xlsx, RiskyChoiceFraming sheet"
    response_type: "Option"
    scoring: "Plan A=0, Plan B=1; population averages measure the proportion choosing Plan B."
  sections:
    - name: "Group size sensitivity for human lives-P-6life"
      human:
        average: 0.64
        population: 50
      instructions: |
        In this case, you need to make a choice directly.
        Please output your answer in the following format:
        Your choice - Plan (either A or B)
        There is no right or wrong answer. Please output your answer directly without any explanations.
      questions:
        - id: "1-P-6life"
          type: "choice"
          prompt: |
            Imagine that 6 people are infected by a fatal disease. Two alternative medical plans to treat the disease have been proposed. Assume that the exact scientific estimates of the consequences of the plans are as follows:
            If Plan A is adopted, 2 people will be saved.
            If Plan B is adopted, there is a one-third probability that all 6 people will be saved and a two-thirds probability that none of them will be saved.
          output_schema:
            properties:
              answer:
                type: "string"
                enum: ["A", "B"]
            required: ["answer"]
          options:
            A: "Plan A"
            B: "Plan B"
          scoring:
            total: 1
            weights:
              A: 0
              B: 1

questionnaire:
  id: "decision-premise"
  name: "Decision Premise"
  description: "Decision-premise items from the DecisionPremise sheet of Turing-Test-Materials.xlsx."
  version: 1
  system_prompt: |
    You are participating in an interview.
    Answer each question as yourself by choosing either Plan A or Plan B.
    Follow the requested answer format and do not provide explanations.
  metadata:
    default_population: 50
    author: "Benchmark Curation Team"
    source: "config/questionnaires/Turing-Test-Materials.xlsx, DecisionPremise sheet"
    response_type: "Option"
    scoring: "Plan A=0, Plan B=1; population averages measure the proportion choosing Plan B."
  sections:
    - name: "Sense of fairness-Pf-6life"
      human:
        average: 0.2
        population: 40
      instructions: |
        In this case, you need to make a choice directly.
        Please output your answer in the following format:
        Your choice - Plan (either A or B)
        There is no right or wrong answer. Please output your answer directly without any explanations.
      questions:
        - id: "1-Pf-6life"
          type: "choice"
          prompt: |
            Imagine that 6 people are infected by a fatal disease. Two alternative medical plans to treat the disease have been proposed. Assume that the exact scientific estimate of the consequences of the plans are as follows:
            If Plan A is adopted, 2 people will be saved.
            If Plan B is adopted, 2 people will be selected to be saved.
          output_schema:
            properties:
              answer:
                type: "string"
                enum: ["A", "B"]
            required: ["answer"]
          options:
            A: "Plan A"
            B: "Plan B"
          scoring:
            total: 1
            weights:
              A: 0
              B: 1
